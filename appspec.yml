version: 0.0
os: linux
files:
  - source: target/student-1.0-SNAPSHOT.jar
    destination: /home/ec2-user/student
hooks:
  ApplicationStop:
    - location: scripts/stop_server.sh
      timeout: 120
      runas: ec2-user
  BeforeInstall:
    - location: scripts/backup_existing.sh
      timeout: 120
      runas: ec2-user
  AfterInstall:
    - location: scripts/start_server.sh
      timeout: 120
      runas: ec2-user
